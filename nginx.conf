server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Rutas del SPA → siempre devuelve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets con hash (JS, CSS, imágenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2|mp3|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
